[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = mysql+pymysql://root:password@localhost:3306/nocode_app?charset=utf8mb4

[post_write_hooks]
hooks =
hook_type = console_scripts

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname = root

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = logging.StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
